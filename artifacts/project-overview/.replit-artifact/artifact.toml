kind = "web"
previewPath = "/project-overview/"
title = "Project Overview"
version = "1.0.0"
id = "artifacts/project-overview"
router = "path"

[[services]]
name = "web"
paths = [ "/project-overview/" ]
localPort = 24909

[services.development]
run = "pnpm --filter @workspace/project-overview run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-overview", "run", "build" ]
serve = "static"
publicDir = "artifacts/project-overview/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24909"
BASE_PATH = "/project-overview/"
